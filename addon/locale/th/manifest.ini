summary = "การเข้าถึง LINE Desktop"
description = """เพิ่มการรองรับการเข้าถึงของ NVDA สำหรับ LINE Desktop บน Windows
ปรับปรุงการนำทางในรายการแชท ข้อความ รายชื่อติดต่อ และช่องป้อนข้อความ
รองรับการโทร การจัดการสายเรียกเข้า การอ่านด้วย OCR โปรแกรมอ่านข้อความจากการส่งออก และการอธิบายรูปภาพด้วย AI พร้อมคำถามต่อเนื่อง"""
changelog = """Incoming-call shortcuts (NVDA+Windows+A/D/S/F) no longer freeze NVDA: they now run on a worker thread on the real gesture path.
AI image description asks for one-time consent before sending a screenshot to a cloud provider with the bundled key.
All gestures now appear under a single translated "LINE Desktop" category in the Input Gestures dialog.
Braille messages follow NVDA's braille message timeout settings.
NVDA 2024.1 or later is now required."""
